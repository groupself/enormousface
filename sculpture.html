<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <title>Sculptures - Enormousface</title>
</head>
<body style="font-family: 'Courier New', Courier, monospace;">

    <a href="https://groupself.github.io/enormousface/error.html">
        <img src="https://groupself.github.io/enormousface/words/sculpture.jpg" alt="everything is for sale" border="0" width="174" height="40">
    </a>

    <br><br><br>
    OLD and NEW WORKS
    <br><br>

    <div id="sculpture-container" style="text-align: center; cursor: crosshair;">
        <h3 id="sculpture-title">Click to advance</h3>
        <div style="min-height: 500px; display: flex; align-items: center; justify-content: center;"> 
            <img id="sculpture-view" src="images/scultpture/breadumbrella.png" style="max-width: 100%; max-height: 85vh; border: 1px solid #000;"> 
        </div>
        <p id="sculpture-counter">1 / 13</p>
    </div>

    <script>
        const sculptures = [
            "images/scultpture/breadumbrella.png",
             "images/scultpture/gumandfingernailscomposite.jpg",
            "images/scultpture/nohopeseedbank.png",
             "images/scultpture/superunfairdice.jpg",
            "images/scultpture/giftforejennanai.jpg",
           "images/scultpture/world.jpg"
            "images/scultpture/ps1piece.jpg",
            "images/scultpture/moreworlds_dickmoon.jpg",
             "images/scultpture/gumbox.JPG",
            "images/scultpture/pendulums.jpg",
            "images/scultpture/belhookswarrhammer.jpg",
            "images/scultpture/claricelispectorstraditionalelectricpencil.jpg",
            "images/scultpture/rezanickwhole.jpg",
           
            
        ];

        let sIndex = 0;
        const sView = document.getElementById('sculpture-view');
        const sCounter = document.getElementById('sculpture-counter');
        const sTitle = document.getElementById('sculpture-title');

        function updateSculpture(index) {
            if (index >= sculptures.length) index = 0;
            if (index < 0) index = sculptures.length - 1;
            sIndex = index;
            sView.src = sculptures[sIndex];
            
            // Clean up name for title
            const name = sculptures[sIndex].split('/').pop().replace(/\.[^/.]+$/, "");
            sTitle.innerText = name;
            sCounter.innerText = (sIndex + 1) + " / " + sculptures.length;
        }

        // Check if image exists before attaching click
        if (sView) {
            sView.onclick = () => updateSculpture(sIndex + 1);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === "ArrowRight") updateSculpture(sIndex + 1);
            if (e.key === "ArrowLeft") updateSculpture(sIndex - 1);
        });
    </script>

    <br><br>
    <a href="https://www.enormousface.com">
        <img src="https://groupself.github.io/enormousface/words/back.jpg" alt="back" border="0" width="162" height="59">
    </a>

</body>
</html>
